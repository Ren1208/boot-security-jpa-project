<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Become Admin Page</title>
</head>
<body>
<h2>Получить права администратора</h2>

<form method="post" action="/became-admin">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <label for="secretPassword">Введите секретный пароль: </label>
    <input type="password" name="secretPassword" id="secretPassword"/>
    <br/>
    <br/>
    <hr/>
    <br/>
    <input type="submit" value="Стать администратором"/>

    <div th:if="${error}" style="color: red" th:text="${error}">
        Неверный секретный пароль
    </div>
</form>

<br/>

<a th:href="@{/hello}">
    <button type="button">Вернуться на главную</button>
</a>
</body>
</html>
